<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <title>portist</title>
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <!-- Тема до загрузки Angular — без вспышки чужой палитры на старте. -->
    <script>
      try {
        document.documentElement.setAttribute(
          "data-theme",
          localStorage.getItem("portist.theme") || "auto",
        );
        // На Windows тень .shell бликует серым в прозрачных углах WebView2 —
        // помечаем ОС, чтобы глобальный CSS её убрал (см. styles.css
        // [data-os="windows"]). Ставим до Angular, как и data-theme.
        if (navigator.userAgent.includes("Windows")) {
          document.documentElement.setAttribute("data-os", "windows");
        }
      } catch (e) {}
    </script>
  </head>
  <body>
    <app-root></app-root>
  </body>
</html>
