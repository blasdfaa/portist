@if (updater.state(); as state) {
  @switch (state.kind) {
    @case ("available") {
      <div class="upd upd--accent">
        <span class="upd-text">
          {{ "update.available" | transloco }} <b>{{ state.version }}</b>
        </span>
        <button type="button" class="upd-cta" (click)="updater.install()">
          {{ "update.install" | transloco }}
        </button>
        <button
          type="button"
          class="upd-x"
          (click)="updater.dismiss()"
          [title]="'update.later' | transloco"
        >
          ✕
        </button>
      </div>
    }
    @case ("error") {
      <div class="upd upd--error">
        <span class="upd-text">
          {{ "update.failed" | transloco: { message: state.message } }}
        </span>
        <button type="button" class="upd-cta" (click)="updater.check()">
          {{ "common.retry" | transloco }}
        </button>
        <button
          type="button"
          class="upd-x"
          (click)="updater.dismiss()"
          [title]="'update.dismiss' | transloco"
        >
          ✕
        </button>
      </div>
    }
  }
}
