<div class="row">
  <div class="info">
    <div class="label">{{ label() }}</div>
    @if (description()) {
      <p class="desc">{{ description() }}</p>
    }
    <!-- Необязательный интерактивный слот под названием (напр. ручная проверка). -->
    <ng-content select="[desc]" />
  </div>
  <div class="control">
    <ng-content />
  </div>
</div>
