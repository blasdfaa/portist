name: release

# Срабатывает только на пуш тега вида v1.2.3 (его ставит `pnpm release` через bumpp).
on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    permissions:
      contents: write # нужно, чтобы создать релиз и залить в него бандлы
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest # Apple Silicon
            args: "--target aarch64-apple-darwin"
          - platform: macos-latest # Intel
            args: "--target x86_64-apple-darwin"
          - platform: ubuntu-22.04 # 22.04 ради совместимости AppImage
            args: ""
          - platform: windows-latest
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Системные зависимости (только Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Кэш Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Зависимости фронта
        run: pnpm install

      - name: Сборка и публикация релиза
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Подпись апдейтов — приватный ключ ~/.tauri/portist_updater.key и его пароль
          # лежат в секретах репозитория (Settings → Secrets and variables → Actions).
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "portist ${{ github.ref_name }}"
          releaseBody: "Скачайте бандл под свою систему. Установленное приложение обновится само."
          releaseDraft: true # релиз создаётся черновиком — публикуете вручную
          prerelease: false
          args: ${{ matrix.args }}
